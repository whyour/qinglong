apiVersion: v1
kind: Namespace
metadata:
  name: qinglong
---
apiVersion: v1
kind: Service
metadata:
  name: qinglong
  namespace: qinglong
  labels:
    app.kubernetes.io/name: qinglong
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: qinglong
  ports:
    - name: http
      port: 5700
      targetPort: http
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: qinglong
  namespace: qinglong
  labels:
    app.kubernetes.io/name: qinglong
spec:
  serviceName: qinglong
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: qinglong
  template:
    metadata:
      labels:
        app.kubernetes.io/name: qinglong
    spec:
      securityContext:
        fsGroup: 5432
        fsGroupChangePolicy: OnRootMismatch
      containers:
        - name: qinglong
          image: whyour/qinglong:debian
          imagePullPolicy: IfNotPresent
          env:
            - name: QlBaseUrl
              value: "/"
            - name: TZ
              value: Asia/Shanghai
          ports:
            - name: http
              containerPort: 5700
          readinessProbe:
            httpGet:
              path: /api/health
              port: http
            initialDelaySeconds: 20
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 6
          livenessProbe:
            httpGet:
              path: /api/health
              port: http
            initialDelaySeconds: 60
            periodSeconds: 20
            timeoutSeconds: 3
            failureThreshold: 6
          startupProbe:
            httpGet:
              path: /api/health
              port: http
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 60
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              memory: 1Gi
          volumeMounts:
            - name: data
              mountPath: /ql/data
  volumeClaimTemplates:
    - metadata:
        name: data
      spec:
        accessModes:
          - ReadWriteOnce
        resources:
          requests:
            storage: 5Gi
